<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Builder Lab - Taller del Creador</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #050505;
      color: white;
      overflow-x: hidden;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    .animate-bounce {
      animation: bounce 1s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .custom-scrollbar::-webkit-scrollbar { width: 3px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SCORE_LABELS = [
      "No me gustó (0)",
      "Puede mejorar (1)",
      "Buena Idea (2)",
      "Genial (3)",
      "Increíble (4)",
      "Es todo lo que está bien (5)"
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [ideas, setIdeas] = useState([]);
      const [formData, setFormData] = useState({ q1: '', q2: '', q3: '', qFuture: '' });
      const [isFinished, setIsFinished] = useState(false);
      const [loading, setLoading] = useState(true);
      const [activeDonationId, setActiveDonationId] = useState(null);
      const [suggestionText, setSuggestionText] = useState('');
      const [selectedScore, setSelectedScore] = useState(null);
      const [votingMode, setVotingMode] = useState(false);
      const [playingId, setPlayingId] = useState(null);
      const [winnerRevealed, setWinnerRevealed] = useState(false);

      const audioCtx = useRef(null);

      const initAudio = () => {
        if (!audioCtx.current) {
          audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
        }
      };

      const playSound = (type) => {
        initAudio();
        if (audioCtx.current.state === 'suspended') audioCtx.current.resume();
        const osc = audioCtx.current.createOscillator();
        const gain = audioCtx.current.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.current.destination);

        if (type === 'build') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(200, audioCtx.current.currentTime);
          osc.frequency.exponentialRampToValueAtTime(50, audioCtx.current.currentTime + 0.3);
          gain.gain.setValueAtTime(0.1, audioCtx.current.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.current.currentTime + 0.3);
          osc.start(); osc.stop(audioCtx.current.currentTime + 0.3);
        } else if (type === 'play') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(440, audioCtx.current.currentTime);
          osc.frequency.exponentialRampToValueAtTime(880, audioCtx.current.currentTime + 0.5);
          gain.gain.setValueAtTime(0.05, audioCtx.current.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.current.currentTime + 0.5);
          osc.start(); osc.stop(audioCtx.current.currentTime + 0.5);
        } else if (type === 'win') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(523.25, audioCtx.current.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.current.currentTime + 0.8);
          gain.gain.setValueAtTime(0.15, audioCtx.current.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.current.currentTime + 1);
          osc.start(); osc.stop(audioCtx.current.currentTime + 1);
        } else if (type === 'hover') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(1000, audioCtx.current.currentTime);
          gain.gain.setValueAtTime(0.02, audioCtx.current.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.current.currentTime + 0.1);
          osc.start(); osc.stop(audioCtx.current.currentTime + 0.1);
        }
      };

      // Cargar monumentos desde localStorage al iniciar
      useEffect(() => {
        const loadIdeas = () => {
          try {
            const saved = localStorage.getItem('builder_lab_monuments');
            if (saved) {
              setIdeas(JSON.parse(saved));
            }
          } catch (err) { console.error(err); }
          setLoading(false);
          setUser({ uid: 'local_user' }); // Simular usuario autenticado
        };
        loadIdeas();
      }, []);

      // Guardar monumentos en localStorage cuando cambien
      useEffect(() => {
        if (ideas.length > 0) {
          localStorage.setItem('builder_lab_monuments', JSON.stringify(ideas));
        }
      }, [ideas]);

      const handleInputChange = (e) => setFormData({ ...formData, [e.target.id]: e.target.value });

      const finishBuild = async () => {
        if (!formData.q1 || !formData.q2 || !formData.q3 || !formData.qFuture) {
          alert("⚒️ ¡Faltan datos!");
          return;
        }
        try {
          playSound('build');
          const count = ideas.length;
          const step = 100 / (count + 2);
          const newPos = (count + 1) * step;

          const newIdea = {
            id: Date.now().toString(),
            problem: formData.q1,
            author: formData.q2,
            fun: formData.q3,
            future: formData.qFuture,
            suggestions: [],
            votes: 0,
            posX: newPos > 90 ? Math.random() * 90 : newPos,
            timestamp: Date.now()
          };
          
          setIdeas(prev => [...prev, newIdea]);
          setIsFinished(true);
          setFormData({ q1: '', q2: '', q3: '', qFuture: '' });
        } catch (err) { console.error(err); }
      };

      const submitDonation = async () => {
        if (!activeDonationId || selectedScore === null) {
          alert("Selecciona una puntuación.");
          return;
        }
        try {
          playSound('build');
          const formattedSuggestion = `[Puntaje: ${selectedScore}/5] ${suggestionText || '¡Gran aporte!'}`;
          
          setIdeas(prev => prev.map(idea => {
            if (idea.id === activeDonationId) {
              return {
                ...idea,
                votes: (idea.votes || 0) + selectedScore,
                suggestions: [...(idea.suggestions || []), formattedSuggestion]
              };
            }
            return idea;
          }));
          
          setActiveDonationId(null);
          setSuggestionText('');
          setSelectedScore(null);
        } catch (err) { console.error(err); }
      };

      const handlePlayIdea = (id) => {
        playSound('play');
        setPlayingId(id);
        setTimeout(() => setPlayingId(null), 2000);
      };

      const revealWinner = () => {
        if (ideas.length === 0) return;
        playSound('win');
        setWinnerRevealed(true);
      };

      const maxScore = ideas.length > 0 ? Math.max(...ideas.map(i => i.votes || 0)) : 0;
      
      const winners = winnerRevealed && maxScore > 0 
        ? ideas.filter(i => (i.votes || 0) === maxScore).map(i => i.id) 
        : [];

      if (loading) return (
        <div className="min-h-screen bg-[#0a0a0a] flex items-center justify-center font-mono text-green-400 text-3xl tracking-widest">
          SINCRONIZANDO BLOQUES...
        </div>
      );

      return (
        <div className="min-h-screen bg-[#050505] text-white p-4 font-sans select-none overflow-x-hidden">
          <div className="max-w-7xl mx-auto">
            
            <header className="flex flex-col md:flex-row justify-between items-center mb-8 gap-6 border-b border-white/5 pb-6">
              <div className="text-center md:text-left">
                <h1 className="text-6xl text-green-500 font-mono tracking-tighter">BUILDER LAB</h1>
                <p className="text-[10px] font-bold text-gray-600 uppercase tracking-[0.4em] mt-1">Innovation Server v2.2</p>
              </div>
              
              <div className="flex flex-wrap justify-center gap-4">
                {ideas.length > 0 && !votingMode && (
                  <button 
                    onClick={() => setVotingMode(true)}
                    className="px-8 py-3 bg-blue-600 text-white font-black rounded-full hover:bg-blue-500 transition-all shadow-[0_0_20px_rgba(37,99,235,0.4)]"
                  >
                    ¿LISTOS PARA EVALUAR?
                  </button>
                )}
                <div className="bg-gray-900/50 px-6 py-4 rounded-3xl border border-white/10 flex items-center gap-4">
                  <span className="text-3xl font-mono text-white">{ideas.length}</span>
                  <i className="fas fa-cubes text-green-500"></i>
                </div>
              </div>
            </header>

            {votingMode && (
              <div className="w-full bg-blue-500/10 border-2 border-blue-500/30 p-5 rounded-3xl mb-10 text-center relative overflow-hidden">
                 <div className="absolute inset-0 bg-blue-500/5 animate-pulse"></div>
                 <h2 className="text-4xl font-mono text-blue-400 font-black uppercase tracking-widest relative z-10">
                    Fase de Calificación
                 </h2>
                 <p className="text-white/60 text-xs mt-2 font-bold uppercase tracking-tighter relative z-10">Asigna de 0 a 5 puntos a cada monumento según su valor</p>
              </div>
            )}

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
              
              <div className="lg:col-span-4 space-y-6">
                {!isFinished ? (
                  <div className="bg-[#111] p-8 rounded-[3rem] border border-white/5 shadow-2xl relative">
                    <h2 className="text-xl text-green-500 font-mono mb-8 border-b border-white/10 pb-4 uppercase tracking-tighter">
                       Materializar Idea
                    </h2>
                    <div className="space-y-6">
                      <div className="space-y-1">
                        <label className="text-[9px] text-blue-400 font-black uppercase">¿Qué problema resuelves?</label>
                        <textarea id="q1" onChange={handleInputChange} value={formData.q1} className="w-full bg-black border border-white/5 rounded-2xl p-4 text-sm focus:border-blue-500 outline-none transition-all" rows="2" />
                      </div>
                      <div className="space-y-1">
                        <label className="text-[9px] text-purple-400 font-black uppercase">¿Qué sorprenderá a tu cliente del Futuro?</label>
                        <textarea id="qFuture" onChange={handleInputChange} value={formData.qFuture} className="w-full bg-black border border-white/5 rounded-2xl p-4 text-sm focus:border-purple-500 outline-none transition-all" rows="2" />
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-1">
                          <label className="text-[9px] text-emerald-400 font-black uppercase">Arquitecto/a</label>
                          <input id="q2" onChange={handleInputChange} value={formData.q2} className="w-full bg-black border border-white/5 rounded-2xl p-4 text-sm focus:border-emerald-500 outline-none" />
                        </div>
                        <div className="space-y-1">
                          <label className="text-[9px] text-pink-400 font-black uppercase">Factor Divertido</label>
                          <input id="q3" onChange={handleInputChange} value={formData.q3} className="w-full bg-black border border-white/5 rounded-2xl p-4 text-sm focus:border-pink-500 outline-none" />
                        </div>
                      </div>
                      <button onClick={finishBuild} className="w-full py-6 bg-green-700 hover:bg-green-600 rounded-3xl font-mono text-2xl shadow-[0_8px_0_0_#064e3b] active:translate-y-2 active:shadow-none transition-all mt-4 uppercase font-black tracking-tighter">
                        Construir Monumento
                      </button>
                    </div>
                  </div>
                ) : (
                  <div className="bg-green-900/10 p-12 rounded-[3rem] border-2 border-green-500/20 text-center animate-in zoom-in">
                    <div className="text-6xl mb-6">⛏️</div>
                    <h3 className="text-2xl font-mono text-white mb-2 uppercase">Mundo Actualizado</h3>
                    <p className="text-gray-500 text-[10px] mb-8 uppercase font-bold tracking-[0.2em]">Tu construcción está en el mapa principal</p>
                    <button onClick={() => setIsFinished(false)} className="w-full py-4 bg-white text-black font-black rounded-2xl uppercase tracking-widest hover:bg-green-400 transition-colors">Nueva Construcción</button>
                  </div>
                )}

                {activeDonationId && (
                  <div className="bg-[#0c0c1a] p-8 rounded-[3rem] border-2 border-blue-600/50 shadow-2xl animate-in slide-in-from-left duration-300">
                    <h3 className="text-lg text-blue-400 font-mono mb-6 uppercase flex items-center gap-2 font-black italic">
                       Asignar Calificación ★
                    </h3>
                    <div className="space-y-2 mb-6">
                      {SCORE_LABELS.map((label, idx) => (
                        <button 
                          key={idx}
                          onClick={() => setSelectedScore(idx)}
                          className={`w-full p-3 rounded-xl border text-left flex items-center gap-3 transition-all
                            ${selectedScore === idx ? 'bg-blue-600 border-white text-white translate-x-2' : 'bg-black/60 border-blue-500/10 text-gray-500 hover:bg-blue-900/20'}`}
                        >
                          <span className="w-6 h-6 rounded bg-blue-900/50 flex items-center justify-center text-[10px] font-mono border border-blue-400/30 font-bold">{idx}</span>
                          <span className="text-[10px] font-bold uppercase tracking-tighter">{label}</span>
                        </button>
                      ))}
                    </div>
                    <textarea value={suggestionText} onChange={(e) => setSuggestionText(e.target.value)} className="w-full bg-black border border-white/5 rounded-2xl p-4 text-xs text-white outline-none mb-6" placeholder="Añade un comentario sobre esta idea..." rows="3" />
                    <div className="flex gap-3">
                       <button onClick={submitDonation} disabled={selectedScore === null} className={`flex-1 py-4 text-white font-black rounded-2xl transition-all shadow-[0_5px_0_0_#1e3a8a] ${selectedScore !== null ? 'bg-blue-600 hover:bg-blue-500' : 'bg-gray-800 opacity-50'}`}>CALIFICAR</button>
                       <button onClick={() => { setActiveDonationId(null); setSelectedScore(null); }} className="px-6 py-4 bg-gray-800 text-white rounded-2xl font-black">X</button>
                    </div>
                  </div>
                )}
              </div>

              <div className="lg:col-span-8 relative">
                
                {votingMode && !winnerRevealed && (
                  <div className="absolute top-20 left-1/2 -translate-x-1/2 z-[300] w-full flex justify-center px-4">
                    <button 
                      onClick={revealWinner}
                      className="px-14 py-6 bg-black text-yellow-500 border-4 border-yellow-500 font-mono text-4xl font-black rounded-full hover:scale-110 active:scale-95 transition-all shadow-[0_0_60px_rgba(234,179,8,0.7)] group overflow-hidden relative"
                    >
                      <span className="relative z-10">🏆 REVELAR GANADOR 🏆</span>
                      <div className="absolute inset-0 bg-yellow-500 translate-y-full group-hover:translate-y-0 transition-transform duration-300 z-0"></div>
                    </button>
                  </div>
                )}

                <div className="relative w-full h-[750px] bg-black rounded-[4rem] border-[12px] border-[#111] overflow-hidden shadow-2xl">
                  <div className="absolute inset-0 opacity-10" style={{backgroundImage: 'radial-gradient(circle, #fff 1px, transparent 1px)', backgroundSize: '40px 40px'}}></div>
                  <div className="absolute bottom-0 w-full h-32 bg-[#1a130e] border-t-8 border-[#144a17]"></div>

                  <div className="absolute inset-0">
                    {ideas.map((idea, idx) => {
                      const isWinner = winners.includes(idea.id);
                      const isPlaying = playingId === idea.id;
                      
                      return (
                        <div 
                          key={idea.id} 
                          onMouseEnter={() => playSound('hover')}
                          className="absolute transition-all duration-1000 flex flex-col items-center group"
                          style={{ 
                            left: `${idea.posX}%`, 
                            bottom: '120px', 
                            zIndex: isWinner ? 100 : 20 + idx,
                            transform: `scale(${isWinner ? 1.5 : 1}) ${isPlaying ? 'translateY(-30px)' : ''}` 
                          }}
                        >
                          <div className="absolute bottom-[260px] left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-all duration-300 pointer-events-none w-72 z-[200]">
                            <div className="bg-[#0a0a0a] border-2 border-white/5 p-5 rounded-3xl shadow-2xl backdrop-blur-xl">
                              <div className="text-green-500 font-mono text-[10px] mb-3 border-b border-white/5 pb-2 uppercase tracking-widest flex justify-between items-center">
                                 <span className="font-black tracking-tighter">{idea.author}</span>
                                 {winnerRevealed && <span className="text-yellow-500 font-bold">TOTAL: {idea.votes} pts</span>}
                              </div>
                              <div className="space-y-2">
                                <p className="text-[10px] text-gray-400 leading-relaxed"><strong className="text-blue-500 uppercase font-black text-[9px]">Misión:</strong> {idea.problem}</p>
                                <p className="text-[10px] text-gray-400 leading-relaxed"><strong className="text-purple-500 uppercase font-black text-[9px]">Futuro:</strong> {idea.future}</p>
                              </div>
                            </div>
                          </div>

                          <div className="relative flex flex-col items-center">
                            <div className={`w-1 h-64 blur-sm mb-0 transition-all duration-1000 
                              ${isWinner ? 'bg-yellow-400/80 w-5 h-80 animate-pulse' : 'bg-green-400/10'} 
                              ${isPlaying ? 'bg-white w-8 blur-xl opacity-100' : ''}`}></div>
                            
                            <div className={`w-14 h-14 flex items-center justify-center text-4xl mb-1 ${isWinner ? 'animate-bounce drop-shadow-[0_0_20px_rgba(255,223,0,1)]' : ''}`}>
                              {isWinner ? '👑' : isPlaying ? '⚡' : '💎'}
                            </div>
                            
                            <div className="flex gap-2">
                              <div className={`w-10 h-16 border-2 transition-all duration-1000 
                                ${isWinner ? 'bg-gradient-to-b from-yellow-300 to-yellow-600 border-yellow-100' : 'bg-emerald-800 border-emerald-950'} 
                                ${isPlaying ? 'bg-white border-cyan-400 scale-110' : ''}`}></div>
                              <div className={`w-10 h-16 border-2 transition-all duration-1000 
                                ${isWinner ? 'bg-gradient-to-b from-yellow-300 to-yellow-600 border-yellow-100' : 'bg-emerald-800 border-emerald-950'} 
                                ${isPlaying ? 'bg-white border-cyan-400 scale-110' : ''}`}></div>
                            </div>
                            
                            <div className={`w-32 h-10 border-2 border-black/40 rounded shadow-2xl flex items-center justify-center px-2 transition-colors ${isWinner ? 'bg-yellow-950' : 'bg-gray-950'}`}>
                               <div className="flex justify-between w-full opacity-60 px-1">
                                  {[...Array(6)].map((_, i) => (
                                    <div 
                                      key={i} 
                                      className={`w-2.5 h-2.5 rounded-sm transition-all duration-500
                                        ${(idea.votes || 0) > (i * 10) ? (winnerRevealed && isWinner ? 'bg-yellow-400 shadow-[0_0_8px_#facc15]' : 'bg-blue-500 shadow-[0_0_8px_#3b82f6]') : 'bg-white/5'}`}
                                    ></div>
                                  ))}
                               </div>
                            </div>

                            <div className="mt-4 flex flex-col gap-2">
                              <button 
                                onClick={() => handlePlayIdea(idea.id)}
                                className="px-5 py-2 bg-gray-900 text-white text-[9px] font-black rounded-full hover:bg-white hover:text-black transition-all uppercase tracking-[0.2em] border border-white/10"
                              >
                                 Play Idea ▶
                              </button>
                              
                              {votingMode && !winnerRevealed && (
                                <button 
                                  onClick={(e) => { e.stopPropagation(); setActiveDonationId(idea.id); }}
                                  className="px-5 py-2 bg-blue-600 text-white text-[9px] font-black rounded-full hover:bg-blue-400 transition-all shadow-lg uppercase tracking-tighter"
                                >
                                  Calificar 0-5 ★
                                </button>
                              )}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="absolute top-8 left-8 flex items-center gap-4 bg-black/80 px-6 py-3 rounded-2xl border border-white/5">
                    <div className="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_12px_#22c55e]"></div>
                    <span className="text-[10px] font-mono font-bold text-white/70 uppercase tracking-[0.3em]">Map: Inventor Lab</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <style>{`
            .custom-scrollbar::-webkit-scrollbar { width: 3px; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 10px; }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
