<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta del Conocimiento - Edición 12 Retos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Bangers&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background: #020617;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .font-game { font-family: 'Bangers', cursive; }

        #wheel-container {
            position: relative;
            width: 500px;
            height: 500px;
            margin: 20px;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #1e293b;
            position: relative;
            overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 0 0 80px rgba(59, 130, 246, 0.3);
        }

        .marker {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: #f43f5e;
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            z-index: 40;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        .center-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            border: 5px solid #0f172a;
            transition: all 0.2s;
        }

        .center-button:hover { transform: translate(-50%, -50%) scale(1.1); }
        .center-button:active { transform: translate(-50%, -50%) scale(0.9); }

        .slice {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .slice-content {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100px;
            left: 45px;
            top: 45px;
        }

        .slice-number {
            font-size: 20px;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .slice-icon {
            width: 24px;
            height: 24px;
            fill: white;
            margin: 2px 0;
        }

        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-content {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 2rem;
            max-width: 600px;
            width: 100%;
            border: 4px solid #3b82f6;
            text-align: center;
            position: relative;
            animation: modalIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalIn {
            from { transform: scale(0.8) translateY(100px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .timer-bar {
            height: 12px;
            background: #334155;
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        .timer-progress {
            height: 100%;
            background: linear-gradient(90deg, #f43f5e, #fb7185);
            width: 100%;
        }

        @media (max-width: 550px) {
            #wheel-container { width: 340px; height: 340px; }
            .slice-content { width: 70px; left: 30px; top: 30px; }
            .slice-number { font-size: 14px; }
        }
    </style>
  <link rel="stylesheet" href="../styles/btn.css">
</head>
<body>

    <div class="text-center mb-6">
        <h1 class="font-game text-6xl text-transparent bg-clip-text bg-gradient-to-b from-blue-400 to-indigo-600 drop-shadow-xl">SÚPER RETO</h1>
        <div class="bg-blue-900/40 px-6 py-2 rounded-full border border-blue-500/30 backdrop-blur-sm mt-2">
            <span class="text-sm font-bold text-blue-200 uppercase tracking-widest">12 Desafíos Gramaticales</span>
        </div>
    </div>

    <div id="wheel-container">
        <div class="marker"></div>
        <div id="wheel"></div>
        <div class="center-button" onclick="spinWheel()">
            <span class="text-slate-900 font-black text-2xl leading-none">YA</span>
            <span class="text-blue-600 font-bold text-[10px]">GIRAR</span>
        </div>
    </div>

    <!-- Modal de Retos -->
    <div id="modal-overlay">
        <div class="modal-content shadow-[0_0_50px_rgba(59,130,246,0.5)]">
            <div id="modal-number" class="absolute -top-12 left-1/2 -translate-x-1/2 w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-700 rounded-full border-4 border-white flex items-center justify-center text-4xl font-black italic shadow-2xl">1</div>
            
            <h2 id="challenge-category" class="text-blue-400 font-black text-sm uppercase mt-8 mb-3 tracking-widest">CATEGORÍA</h2>
            <div id="challenge-text" class="text-2xl sm:text-4xl font-bold text-white mb-10 leading-snug"></div>
            
            <div id="timer-container" class="hidden px-4">
                <div class="flex justify-between items-end mb-2">
                    <p class="text-xs text-slate-400 font-bold uppercase">Tiempo restante</p>
                    <p id="timer-seconds" class="text-2xl font-black text-rose-500">60s</p>
                </div>
                <div class="timer-bar">
                    <div id="progress" class="timer-progress"></div>
                </div>
            </div>

            <button onclick="closeModal()" class="btn-3d btn-white mt-12 btn-lg btn-pill">
                ¡Reto Cumplido!
            </button>
        </div>
    </div>

    <script>
        const icons = {
            search: `<svg class="slice-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>`,
            flash: `<svg class="slice-icon" viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>`,
            book: `<svg class="slice-icon" viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/></svg>`,
            edit: `<svg class="slice-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>`,
            brain: `<svg class="slice-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>`,
            draw: `<svg class="slice-icon" viewBox="0 0 24 24"><path d="M21 7L9 19l-5.5-5.5 1.41-1.41L9 16.17 19.59 5.59 21 7zM3 17.25V21h3.75l11.06-11.06-3.75-3.75L3 17.25z"/></svg>`,
            objects: `<svg class="slice-icon" viewBox="0 0 24 24"><path d="M12 2l-5.5 9h11L12 2zm0 3.84L13.93 9h-3.87L12 5.84zM17.5 13c-2.49 0-4.5 2.01-4.5 4.5s2.01 4.5 4.5 4.5 4.5-2.01 4.5-4.5-2.01-4.5-4.5-4.5zm0 7c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5zM3 21.5h8v-8H3v8zm2-6h4v4H5v-4z"/></svg>`,
            secret: `<svg class="slice-icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 11H7V9h2v2zm4 0h-2V9h2v2zm4 0h-2V9h2v2z"/></svg>`
        };

        const challenges = [
            { id: 1, label: "Sustantivo", icon: icons.search, cat: "Análisis", text: "Encuentra el <span class='text-blue-400'>SUSTANTIVO</span> y el <span class='text-emerald-400'>ARTÍCULO</span>: <br><br> <div class='italic bg-slate-800 p-4 rounded-lg'>'El joven líder navega por la red.'</div>" },
            { id: 2, label: "Acción", icon: icons.flash, cat: "Velocidad", text: "¿Cuál es el <span class='text-yellow-400 font-black'>VERBO</span> aquí? <br><br> <div class='italic bg-slate-800 p-4 rounded-lg'>'Las ideas crecen cuando trabajamos.'</div>" },
            { id: 3, label: "Concepto", icon: icons.book, cat: "Teoría", text: "¿Qué es un <span class='text-pink-400 font-bold'>ADJETIVO</span>? <br><br> Da un ejemplo creativo." },
            { id: 4, label: "Creatividad", icon: icons.edit, cat: "Manualidad", text: "¡Reto de Acción! <br><br> Construye una <span class='text-emerald-400 underline'>alcancía de papel</span> en 2 minutos.", hasTimer: true, duration: 120 },
            { id: 5, label: "Análisis", icon: icons.brain, cat: "Gramática", text: "¿Cuál es el <span class='text-orange-400'>ADJETIVO</span>? <br><br> <div class='italic bg-slate-800 p-4 rounded-lg'>'El emprendedor hábil organiza sus finanzas.'</div>" },
            { id: 6, label: "Adverbios", icon: icons.search, cat: "Clasificación", text: "Dime 2 <span class='text-purple-400'>ADVERBIOS</span> de lugar y 2 de tiempo ahora mismo." },
            { id: 7, label: "Conexión", icon: icons.flash, cat: "Lógica", text: "Usa un <span class='text-cyan-400'>CONECTOR</span> para unir: <br><br> 'Estudié mucho' ___ 'saqué buena nota'." },
            { id: 8, label: "Escritura", icon: icons.edit, cat: "Redacción", text: "Escribe una oración con el sustantivo <span class='text-yellow-400'>LÍDERES</span> y un adjetivo." },
            { id: 9, label: "Listado", icon: icons.book, cat: "Memoria", text: "Dime 5 <span class='text-emerald-400 font-bold'>ARTÍCULOS</span> en 10 segundos.", hasTimer: true, duration: 10 },
            { id: 10, label: "Dibujo", icon: icons.draw, cat: "Reto Colaborativo", text: "🎨 <span class='text-yellow-400'>DIBUJA ALGO</span> y muéstralo. <br><br> <p class='text-lg'>Los demás deben crear una oración con: Artículo, Sustantivo, Verbo, Conector y Adverbio basada en tu dibujo.</p>", hasTimer: true, duration: 90 },
            { id: 11, label: "Objetos", icon: icons.objects, cat: "Realidad", text: "🔍 Busca <span class='text-blue-400 font-black'>3 OBJETOS</span> que tengas cerca. <br><br> Muéstralos y crea una <span class='text-emerald-400 italic'>frase positiva</span> con ellos." },
            { id: 12, label: "Mímica", icon: icons.secret, cat: "Chat Secreto", text: "🤫 <span class='text-rose-400'>MÍMICA SECRETA</span> <br><br> <p class='text-lg'>Recibirás una frase por chat privado. Los demás deben adivinar el <span class='underline'>Sustantivo</span> y el <span class='underline'>Verbo</span> solo con tus señas.</p>", hasTimer: true, duration: 60 }
        ];

        const wheel = document.getElementById('wheel');
        const colors = [
            '#3b82f6', '#10b981', '#f59e0b', '#ef4444', 
            '#8b5cf6', '#06b6d4', '#ec4899', '#f97316', 
            '#6366f1', '#14b8a6', '#f43f5e', '#a855f7'
        ];
        
        let currentRotation = 0;
        let isSpinning = false;
        let timerInterval;

        function createWheel() {
            const numSlices = challenges.length;
            const degPerSlice = 360 / numSlices;

            challenges.forEach((challenge, i) => {
                const slice = document.createElement('div');
                slice.className = 'slice';
                slice.style.backgroundColor = colors[i];
                slice.style.transform = `rotate(${degPerSlice * i}deg) skewY(${90 - degPerSlice}deg)`;
                
                const content = document.createElement('div');
                content.className = 'slice-content';
                content.style.transform = `skewY(-${90 - degPerSlice}deg) rotate(${degPerSlice / 2}deg)`;
                
                content.innerHTML = `
                    <div class="slice-number">${challenge.id}</div>
                    ${challenge.icon}
                    <div class="text-[7px] font-black uppercase tracking-tighter opacity-90 leading-none">${challenge.label}</div>
                `;

                slice.appendChild(content);
                wheel.appendChild(slice);
            });
        }

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;

            const extraSpins = 8 + Math.floor(Math.random() * 5);
            const randomSlice = Math.floor(Math.random() * challenges.length);
            const degPerSlice = 360 / challenges.length;
            
            // Calculamos para que el centro de la tajada quede arriba
            const targetRotation = (extraSpins * 360) + (360 - (randomSlice * degPerSlice)) - (degPerSlice / 2);
            
            currentRotation += targetRotation;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                showChallenge(randomSlice);
                isSpinning = false;
            }, 5100);
        }

        function showChallenge(index) {
            const challenge = challenges[index];
            document.getElementById('modal-number').innerText = challenge.id;
            document.getElementById('challenge-category').innerText = challenge.cat;
            document.getElementById('challenge-text').innerHTML = challenge.text;
            document.getElementById('modal-overlay').style.display = 'flex';

            if (challenge.hasTimer) {
                startTimer(challenge.duration);
            } else {
                document.getElementById('timer-container').classList.add('hidden');
            }
        }

        function startTimer(seconds) {
            const container = document.getElementById('timer-container');
            const progress = document.getElementById('progress');
            const timerLabel = document.getElementById('timer-seconds');
            container.classList.remove('hidden');
            
            let timeLeft = seconds;
            progress.style.width = '100%';
            timerLabel.innerText = `${timeLeft}s`;

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerLabel.innerText = `${timeLeft}s`;
                progress.style.width = `${(timeLeft / seconds) * 100}%`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerLabel.innerText = "¡TIEMPO!";
                }
            }, 1000);
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            clearInterval(timerInterval);
        }

        window.onload = createWheel;
    </script>
</body>
</html>
