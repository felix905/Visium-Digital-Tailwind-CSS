<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Módulos de Aprendizaje - Líderes Ingeniosos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg,#ede9fe 0%,#fce7f3 40%,#dbeafe 100%); min-height:100vh; }
    .glass { background:rgba(255,255,255,.85); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,.9); }
    .module-card { transition: all 0.3s ease; cursor: pointer; }
    .module-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(139,92,246,.15); }
    .module-card.completed { border-color: #10b981; background: #ecfdf5; }
    .progress-bar { transition: width 0.5s ease; }
    .question-card { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .option-btn { transition: all 0.2s ease; }
    .option-btn:hover { transform: translateX(4px); }
    .option-btn.correct { background: #d1fae5; border-color: #10b981; color: #065f46; }
    .option-btn.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
    .hidden { display: none !important; }
  </style>
</head>
<body class="p-4">
  <!-- Header -->
  <div class="max-w-4xl mx-auto mb-6">
    <div class="glass rounded-2xl p-6 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <button onclick="goBack()" class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center text-purple-600 hover:bg-purple-200 transition">
          <i class="fas fa-arrow-left"></i>
        </button>
        <div>
          <h1 class="text-xl font-bold text-gray-900">📚 Módulos de Aprendizaje</h1>
          <p class="text-sm text-gray-500">Completa los 6 módulos para aprender</p>
        </div>
      </div>
      <div class="text-right">
        <div class="text-sm text-gray-500">Progreso general</div>
        <div class="text-2xl font-bold text-purple-600" id="overall-progress">0/6</div>
      </div>
    </div>
  </div>

  <!-- Modules Grid -->
  <div id="modules-grid" class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <!-- Generated by JS -->
  </div>

  <!-- Module Content Modal -->
  <div id="module-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
      <!-- Reading Section -->
      <div id="reading-section" class="p-6">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <span id="module-emoji" class="text-4xl"></span>
            <div>
              <h2 id="module-title" class="text-xl font-bold text-gray-900"></h2>
              <span class="text-sm text-gray-500">Lectura</span>
            </div>
          </div>
          <button onclick="closeModule()" class="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center text-gray-600 hover:bg-gray-200 transition">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div id="module-content" class="prose prose-purple max-w-none mb-6">
          <!-- Content generated by JS -->
        </div>
        <button onclick="startQuiz()" class="w-full py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-semibold transition flex items-center justify-center gap-2">
          <i class="fas fa-play"></i> Comenzar Cuestionario
        </button>
      </div>

      <!-- Quiz Section -->
      <div id="quiz-section" class="p-6 hidden">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <span id="quiz-emoji" class="text-4xl"></span>
            <div>
              <h2 id="quiz-title" class="text-xl font-bold text-gray-900"></h2>
              <span class="text-sm text-gray-500">Cuestionario</span>
            </div>
          </div>
          <div class="text-sm text-gray-500">
            Pregunta <span id="current-question">1</span> de <span id="total-questions">3</span>
          </div>
        </div>

        <!-- Progress bar -->
        <div class="w-full bg-gray-200 rounded-full h-2 mb-6">
          <div id="quiz-progress" class="bg-purple-600 h-2 rounded-full progress-bar" style="width: 0%"></div>
        </div>

        <!-- Question -->
        <div id="question-container" class="question-card">
          <h3 id="question-text" class="text-lg font-semibold text-gray-800 mb-4"></h3>
          <div id="options-container" class="space-y-3">
            <!-- Options generated by JS -->
          </div>
        </div>

        <!-- Results -->
        <div id="results-section" class="hidden text-center py-8">
          <div class="text-6xl mb-4" id="result-emoji">🎉</div>
          <h3 class="text-2xl font-bold text-gray-900 mb-2">¡Módulo Completado!</h3>
          <p class="text-gray-600 mb-4">Puntuación: <span id="score-display" class="font-bold text-purple-600"></span></p>
          <div class="flex gap-3 justify-center">
            <button onclick="closeModule()" class="px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-semibold transition">
              Volver a Módulos
            </button>
            <button onclick="retakeQuiz()" class="px-6 py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-semibold transition">
              Reintentar
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 6 Módulos educativos
    const modules = [
      {
        id: 1,
        emoji: '💰',
        title: '¿Qué es el Dinero?',
        color: 'from-yellow-400 to-orange-400',
        reading: `
          <h3 class="font-bold text-lg mb-2">El Dinero: Una Herramienta de Intercambio</h3>
          <p class="mb-3">El dinero es un medio de intercambio que usamos para obtener bienes y servicios. Antes del dinero, las personas practicaban el trueque: cambiaban una gallina por pan, por ejemplo.</p>
          <p class="mb-3">El dinero tiene tres funciones principales:</p>
          <ul class="list-disc pl-5 mb-3 space-y-1">
            <li><strong>Medio de intercambio:</strong> Permite comprar y vender</li>
            <li><strong>Unidad de cuenta:</strong> Nos permite comparar precios</li>
            <li><strong>Reserva de valor:</strong> Podemos ahorrarlo para el futuro</li>
          </ul>
          <p>En Venezuela tenemos el Bolívar, pero también se usan dólares y otras monedas. Lo importante es entender que el dinero representa valor y trabajo.</p>
        `,
        questions: [
          {
            question: '¿Cuál era el sistema de intercambio antes del dinero?',
            options: ['El trueque', 'La banca', 'Las tarjetas de crédito', 'Los bitcoins'],
            correct: 0
          },
          {
            question: '¿Cuál es la moneda oficial de Venezuela?',
            options: ['Dólar', 'Peso', 'Bolívar', 'Euro'],
            correct: 2
          },
          {
            question: '¿Cuántas funciones principales tiene el dinero?',
            options: ['1', '2', '3', '4'],
            correct: 2
          }
        ]
      },
      {
        id: 2,
        emoji: '🐷',
        title: 'Cómo Ahorrar',
        color: 'from-pink-400 to-rose-400',
        reading: `
          <h3 class="font-bold text-lg mb-2">El Arte del Ahorro</h3>
          <p class="mb-3">Ahorrar significa guardar dinero para el futuro en lugar de gastarlo todo ahora. Es una habilidad muy importante que te ayudará toda la vida.</p>
          <p class="mb-3">Consejos para ahorrar:</p>
          <ul class="list-disc pl-5 mb-3 space-y-1">
            <li><strong>La regla del 50/30/20:</strong> 50% necesidades, 30% gustos, 20% ahorro</li>
            <li><strong>Establece metas:</strong> ¿Para qué quieres ahorrar?</li>
            <li><strong>Usa una alcancía:</strong> Visualiza tu progreso</li>
            <li><strong>Sé paciente:</strong> El ahorro es un hábito que se construye</li>
          </ul>
          <p>Recuerda: cada pequeño ahorro suma. Si ahorras 1 dólar diario, en un año tendrás $365.</p>
        `,
        questions: [
          {
            question: '¿Qué porcentaje recomienda la regla 50/30/20 para ahorro?',
            options: ['10%', '20%', '30%', '50%'],
            correct: 1
          },
          {
            question: 'Si ahorras $1 diario, ¿cuánto tendrás en un año?',
            options: ['$100', '$365', '$500', '$1000'],
            correct: 1
          },
          {
            question: '¿Qué herramienta te ayuda a visualizar tu progreso de ahorro?',
            options: ['Una calculadora', 'Una alcancía', 'Un reloj', 'Un calendario'],
            correct: 1
          }
        ]
      },
      {
        id: 3,
        emoji: '🛒',
        title: 'Necesidades vs Deseos',
        color: 'from-blue-400 to-cyan-400',
        reading: `
          <h3 class="font-bold text-lg mb-2">Aprendiendo a Distinguir</h3>
          <p class="mb-3"><strong>Necesidades:</strong> Son cosas esenciales para vivir: comida, agua, techo, ropa, educación, salud.</p>
          <p class="mb-3"><strong>Deseos:</strong> Son cosas que queremos pero no necesitamos para vivir: juguetes, dulces, videojuegos, ropa de marca.</p>
          <p class="mb-3">Pregunta mágica antes de comprar:</p>
          <ul class="list-disc pl-5 mb-3 space-y-1">
            <li>¿Realmente lo necesito?</li>
            <li>¿Puedo vivir sin esto?</li>
            <li>¿Es una prioridad ahora?</li>
          </ul>
          <p>Aprender esta diferencia te hará un consumidor inteligente y te ayudará a ahorrar dinero.</p>
        `,
        questions: [
          {
            question: '¿Cuál de estos es una NECESIDAD básica?',
            options: ['Un videojuego nuevo', 'Comida', 'Zapatos de marca', 'Un juguete'],
            correct: 1
          },
          {
            question: '¿Cuál de estos es un DESEO, no una necesidad?',
            options: ['Agua', 'Dulces', 'Ropa básica', 'Educación'],
            correct: 1
          },
          {
            question: '¿Qué pregunta debes hacerte antes de comprar algo?',
            options: ['¿Es caro?', '¿Realmente lo necesito?', '¿Lo tiene mi amigo?', '¿Es de color rojo?'],
            correct: 1
          }
        ]
      },
      {
        id: 4,
        emoji: '📊',
        title: 'Presupuesto Personal',
        color: 'from-green-400 to-emerald-400',
        reading: `
          <h3 class="font-bold text-lg mb-2">Planificando tu Dinero</h3>
          <p class="mb-3">Un presupuesto es un plan que te muestra cuánto dinero entra (ingresos) y cuánto sale (gastos). Es como un mapa para tus finanzas.</p>
          <p class="mb-3">Pasos para crear tu presupuesto:</p>
          <ol class="list-decimal pl-5 mb-3 space-y-1">
            <li><strong>Calcula tus ingresos:</strong> Mesada, regalos, trabajo</li>
            <li><strong>Lista tus gastos:</strong> Necesidades primero</li>
            <li><strong>Resta:</strong> Ingresos - Gastos = Ahorro posible</li>
            <li><strong>Ajusta:</strong> Si gastas más de lo que entras, reduce deseos</li>
          </ol>
          <p>¡El objetivo es que siempre gastes MENOS de lo que recibes!</p>
        `,
        questions: [
          {
            question: '¿Qué es un presupuesto?',
            options: ['Una lista de deseos', 'Un plan de ingresos y gastos', 'Un tipo de moneda', 'Un juego de mesa'],
            correct: 1
          },
          {
            question: '¿Cuál debe ser el objetivo de un buen presupuesto?',
            options: ['Gastar todo', 'Gastar menos de lo que recibes', 'Pedir prestado', 'No ahorrar'],
            correct: 1
          },
          {
            question: '¿Qué debes restar a tus ingresos para saber cuánto puedes ahorrar?',
            options: ['Los gastos', 'El tiempo', 'Los amigos', 'Los colores'],
            correct: 0
          }
        ]
      },
      {
        id: 5,
        emoji: '🤝',
        title: 'Trabajo en Equipo',
        color: 'from-purple-400 to-violet-400',
        reading: `
          <h3 class="font-bold text-lg mb-2">Juntos Somos Más Fuertes</h3>
          <p class="mb-3">El trabajo en equipo significa colaborar con otros para alcanzar una meta común. Es una habilidad esencial para la vida.</p>
          <p class="mb-3">Beneficios del trabajo en equipo:</p>
          <ul class="list-disc pl-5 mb-3 space-y-1">
            <li><strong>Compartir ideas:</strong> Más cerebros = mejores soluciones</li>
            <li><strong>Distribuir tareas:</strong> Cada uno hace lo que mejor sabe</li>
            <li><strong>Apoyarse mutuamente:</strong> Cuando uno cae, los otros ayudan</li>
            <li><strong>Logros compartidos:</strong> La victoria sabe mejor en grupo</li>
          </ul>
          <p class="mb-3">Características de un buen compañero de equipo:</p>
          <ul class="list-disc pl-5 mb-3 space-y-1">
            <li>Escucha a los demás</li>
            <li>Cumple con sus responsabilidades</li>
            <li>Respeta las diferencias</li>
            <li>Celebra los éxitos del grupo</li>
          </ul>
          <p>Recuerda: "Si quieres ir rápido, ve solo. Si quieres llegar lejos, ve acompañado."</p>
        `,
        questions: [
          {
            question: '¿Cuál es una característica de un buen compañero de equipo?',
            options: ['No escuchar a los demás', 'Escuchar a los demás', 'Hacer todo solo', 'No respetar a otros'],
            correct: 1
          },
          {
            question: '¿Qué beneficio tiene compartir ideas en equipo?',
            options: ['Confusión', 'Mejores soluciones', 'Menos amigos', 'Más trabajo'],
            correct: 1
          },
          {
            question: '¿Qué dice el refrán sobre ir acompañado?',
            options: ['Si quieres llegar lejos, ve solo', 'Si quieres llegar lejos, ve acompañado', 'No viajes nunca', 'Viaja rápido'],
            correct: 1
          }
        ]
      },
      {
        id: 6,
        emoji: '💎',
        title: 'Valores Humanos',
        color: 'from-red-400 to-rose-400',
        reading: `
          <h3 class="font-bold text-lg mb-2">Los Valores que Nos Guían</h3>
          <p class="mb-3">Los valores son principios que guían nuestro comportamiento y nos ayudan a ser mejores personas. Son como una brújula interna.</p>
          <p class="mb-3">Valores fundamentales:</p>
          <ul class="list-disc pl-5 mb-3 space-y-1">
            <li><strong>Honestidad:</strong> Decir la verdad y actuar con integridad</li>
            <li><strong>Responsabilidad:</strong> Cumplir con nuestras obligaciones</li>
            <li><strong>Respeto:</strong> Tratar bien a todos y sus derechos</li>
            <li><strong>Solidaridad:</strong> Ayudar a quienes lo necesitan</li>
            <li><strong>Empatía:</strong> Ponernos en el lugar del otro</li>
          </ul>
          <p class="mb-3">¿Por qué son importantes los valores?</p>
          <ul class="list-disc pl-5 mb-3 space-y-1">
            <li>Nos permiten vivir en armonía con otros</li>
            <li>Nos hacen dignos de confianza</li>
            <li>Nos ayudan a tomar buenas decisiones</li>
            <li>Construyen nuestra reputación</li>
          </ul>
          <p>Los valores se practican todos los días con pequeñas acciones. ¡Sé el cambio que quieres ver en el mundo!</p>
        `,
        questions: [
          {
            question: '¿Qué valor significa decir la verdad y actuar con integridad?',
            options: ['Respeto', 'Honestidad', 'Solidaridad', 'Empatía'],
            correct: 1
          },
          {
            question: '¿Qué valor nos lleva a ayudar a quienes lo necesitan?',
            options: ['Responsabilidad', 'Solidaridad', 'Honestidad', 'Respeto'],
            correct: 1
          },
          {
            question: '¿Cómo se practican los valores?',
            options: ['Solo los domingos', 'Con pequeñas acciones diarias', 'Nunca', 'Solo cuando alguien ve'],
            correct: 1
          }
        ]
      }
    ];

    let currentModule = null;
    let currentQuestion = 0;
    let score = 0;
    let userAnswers = [];

    // Get user data
    function getUserId() {
      return sessionStorage.getItem('li_user_id') || '1';
    }

    function getUserName() {
      return sessionStorage.getItem('li_user') || 'Usuario';
    }

    // Load progress
    function loadProgress() {
      const userId = getUserId();
      const key = `li_progress_${userId}`;
      const data = localStorage.getItem(key);
      if (data) {
        return JSON.parse(data);
      }
      return null;
    }

    // Save module progress
    function saveModuleProgress(moduleId, score, totalQuestions) {
      const userId = getUserId();
      const key = `li_progress_${userId}`;
      let data = loadProgress();
      
      if (!data) {
        data = {
          userId: userId,
          userName: getUserName(),
          points: 0,
          level: 1,
          title: 'Explorador Financiero',
          streak: 0,
          joinDate: new Date().toLocaleDateString('es-ES'),
          modules: [],
          challenges: [],
          achievements: [],
          lastActivity: null
        };
      }

      // Update module
      const moduleIndex = data.modules.findIndex(m => m.id === moduleId);
      const progress = Math.round((score / totalQuestions) * 100);
      const moduleData = {
        id: moduleId,
        emoji: modules.find(m => m.id === moduleId).emoji,
        title: modules.find(m => m.id === moduleId).title,
        score: score,
        totalQuestions: totalQuestions,
        progress: progress,
        completed: score === totalQuestions,
        completedAt: new Date().toISOString()
      };

      if (moduleIndex >= 0) {
        // Only update if new score is better
        if (score > data.modules[moduleIndex].score) {
          data.modules[moduleIndex] = moduleData;
        }
      } else {
        data.modules.push(moduleData);
      }

      // Update points
      const pointsEarned = score * 10;
      data.points = (data.points || 0) + pointsEarned;
      data.lastActivity = new Date().toISOString();

      localStorage.setItem(key, JSON.stringify(data));
      return data;
    }

    // Render modules grid
    function renderModules() {
      const grid = document.getElementById('modules-grid');
      const progress = loadProgress();
      let completedCount = 0;

      grid.innerHTML = modules.map(m => {
        const userModule = progress?.modules?.find(um => um.id === m.id);
        const isCompleted = userModule?.completed || false;
        const moduleProgress = userModule?.progress || 0;
        if (isCompleted) completedCount++;

        return `
          <div class="module-card glass rounded-2xl p-5 border-2 ${isCompleted ? 'border-green-400 completed' : 'border-gray-200'}" 
               onclick="openModule(${m.id})">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-12 h-12 bg-gradient-to-br ${m.color} rounded-xl flex items-center justify-center text-2xl">
                ${m.emoji}
              </div>
              <div>
                <h3 class="font-bold text-gray-900 text-sm">${m.title}</h3>
                ${isCompleted ? '<span class="text-xs text-green-600 font-semibold">✓ Completado</span>' : '<span class="text-xs text-gray-500">3 preguntas</span>'}
              </div>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
              <div class="bg-gradient-to-r ${m.color} h-2 rounded-full progress-bar" style="width:${moduleProgress}%"></div>
            </div>
            <p class="text-xs text-gray-500 mt-2">${moduleProgress}% completado</p>
          </div>
        `;
      }).join('');

      document.getElementById('overall-progress').textContent = `${completedCount}/${modules.length}`;
    }

    // Open module
    function openModule(moduleId) {
      currentModule = modules.find(m => m.id === moduleId);
      currentQuestion = 0;
      score = 0;
      userAnswers = [];

      document.getElementById('module-emoji').textContent = currentModule.emoji;
      document.getElementById('module-title').textContent = currentModule.title;
      document.getElementById('module-content').innerHTML = currentModule.reading;
      
      document.getElementById('quiz-emoji').textContent = currentModule.emoji;
      document.getElementById('quiz-title').textContent = currentModule.title;
      document.getElementById('total-questions').textContent = currentModule.questions.length;

      document.getElementById('reading-section').classList.remove('hidden');
      document.getElementById('quiz-section').classList.add('hidden');
      document.getElementById('results-section').classList.add('hidden');
      
      document.getElementById('module-modal').classList.remove('hidden');
      document.getElementById('module-modal').classList.add('flex');
    }

    // Close module
    function closeModule() {
      document.getElementById('module-modal').classList.add('hidden');
      document.getElementById('module-modal').classList.remove('flex');
      renderModules();
    }

    // Start quiz
    function startQuiz() {
      document.getElementById('reading-section').classList.add('hidden');
      document.getElementById('quiz-section').classList.remove('hidden');
      showQuestion();
    }

    // Show question
    function showQuestion() {
      const question = currentModule.questions[currentQuestion];
      document.getElementById('current-question').textContent = currentQuestion + 1;
      document.getElementById('question-text').textContent = question.question;
      
      const progress = ((currentQuestion) / currentModule.questions.length) * 100;
      document.getElementById('quiz-progress').style.width = `${progress}%`;

      const optionsContainer = document.getElementById('options-container');
      optionsContainer.innerHTML = question.options.map((opt, idx) => `
        <button onclick="selectAnswer(${idx})" class="option-btn w-full p-4 text-left border-2 border-gray-200 rounded-xl bg-white hover:bg-purple-50 font-medium" data-option="${idx}">
          <span class="inline-block w-8 h-8 bg-purple-100 rounded-lg text-center leading-8 mr-3 text-purple-600 font-bold">${String.fromCharCode(65 + idx)}</span>
          ${opt}
        </button>
      `).join('');
    }

    // Select answer
    function selectAnswer(optionIndex) {
      const question = currentModule.questions[currentQuestion];
      const isCorrect = optionIndex === question.correct;
      
      userAnswers.push({
        question: question.question,
        answer: question.options[optionIndex],
        correct: isCorrect,
        correctAnswer: question.options[question.correct]
      });

      // Show visual feedback
      document.querySelectorAll('.option-btn').forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === question.correct) {
          btn.classList.add('correct');
        } else if (idx === optionIndex && !isCorrect) {
          btn.classList.add('wrong');
        }
      });

      if (isCorrect) score++;

      // Next question after delay
      setTimeout(() => {
        currentQuestion++;
        if (currentQuestion < currentModule.questions.length) {
          showQuestion();
        } else {
          showResults();
        }
      }, 1500);
    }

    // Show results
    function showResults() {
      const totalQuestions = currentModule.questions.length;
      const percentage = Math.round((score / totalQuestions) * 100);
      
      // Save progress
      saveModuleProgress(currentModule.id, score, totalQuestions);

      document.getElementById('question-container').classList.add('hidden');
      document.getElementById('results-section').classList.remove('hidden');
      document.getElementById('score-display').textContent = `${score}/${totalQuestions} (${percentage}%)`;
      
      if (percentage === 100) {
        document.getElementById('result-emoji').textContent = '🏆';
      } else if (percentage >= 70) {
        document.getElementById('result-emoji').textContent = '🌟';
      } else {
        document.getElementById('result-emoji').textContent = '📚';
      }
    }

    // Retake quiz
    function retakeQuiz() {
      currentQuestion = 0;
      score = 0;
      userAnswers = [];
      document.getElementById('results-section').classList.add('hidden');
      document.getElementById('question-container').classList.remove('hidden');
      showQuestion();
    }

    // Go back
    function goBack() {
      if (window.parent && window.parent.showPage) {
        window.parent.showPage('dashboard');
      } else {
        window.location.href = '../app.html';
      }
    }

    // Close modal on outside click
    document.getElementById('module-modal').addEventListener('click', e => {
      if (e.target.id === 'module-modal') closeModule();
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      console.log('Page loaded, checking session...');
      const userId = getUserId();
      const userName = getUserName();
      console.log('User:', userName, 'ID:', userId);
      
      if (!sessionStorage.getItem('li_user') || !sessionStorage.getItem('li_user_id')) {
        console.log('No session found, redirecting to login...');
        window.location.href = '../login.html';
        return;
      }
      
      renderModules();
    });
  </script>
</body>
</html>
