<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" class="w-full h-full">
  <defs>
    <!-- Gradiente cuerpo principal - Rosa vibrante 3D -->
    <radialGradient id="bodyGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FF8FB1"/>
      <stop offset="40%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </radialGradient>
    <radialGradient id="bodyShadow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#C2185B"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </radialGradient>
    
    <!-- Gradiente ojos esféricos -->
    <radialGradient id="eyeGrad" cx="25%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="80%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </radialGradient>
    <radialGradient id="pupilGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#212121"/>
    </radialGradient>
    
    <!-- Brillo 3D -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    
    <!-- Sombras suaves -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="3" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Sombra pronunciada -->
    <filter id="strongShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="4" dy="8" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Sombra del suelo -->
  <ellipse cx="120" cy="265" rx="90" ry="15" fill="rgba(0,0,0,0.12)"/>
  
  <!-- Brazo izquierdo -->
  <ellipse cx="45" cy="160" rx="25" ry="35" fill="url(#bodyGrad)" transform="rotate(-25 45 160)" filter="url(#softShadow)"/>
  <circle cx="32" cy="188" r="18" fill="#FF6B9D"/>
  
  <!-- Brazo derecho -->
  <ellipse cx="195" cy="160" rx="25" ry="35" fill="url(#bodyGrad)" transform="rotate(25 195 160)" filter="url(#softShadow)"/>
  <circle cx="208" cy="188" r="18" fill="#FF6B9D"/>
  
  <!-- Cuerpo principal - forma orgánica de blob -->
  <path d="M120 25 
           C175 25, 210 65, 210 120
           C210 180, 185 235, 120 255
           C55 235, 30 180, 30 120
           C30 65, 65 25, 120 25Z" 
        fill="url(#bodyGrad)" filter="url(#strongShadow)"/>
  
  <!-- Brillo superior izquierdo -->
  <ellipse cx="75" cy="80" rx="45" ry="55" fill="url(#highlight)" opacity="0.5"/>
  
  <!-- Brillo pequeño -->
  <circle cx="160" cy="60" r="15" fill="rgba(255,255,255,0.25)"/>
  
  <!-- Ojo izquierdo - grande y expresivo -->
  <circle cx="80" cy="115" r="38" fill="url(#eyeGrad)" filter="url(#softShadow)"/>
  <circle cx="80" cy="115" r="30" fill="#FFFFFF"/>
  <!-- Pupila izquierda -->
  <circle cx="80" cy="115" r="18" fill="url(#pupilGrad)"/>
  <circle cx="74" cy="109" r="7" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="86" cy="120" r="3" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- Ojo derecho - grande y expresivo -->
  <circle cx="160" cy="115" r="38" fill="url(#eyeGrad)" filter="url(#softShadow)"/>
  <circle cx="160" cy="115" r="30" fill="#FFFFFF"/>
  <!-- Pupila derecha -->
  <circle cx="160" cy="115" r="18" fill="url(#pupilGrad)"/>
  <circle cx="154" cy="109" r="7" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="166" cy="120" r="3" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- Boca sonriente amplia -->
  <path d="M85 175 Q120 210, 155 175" 
        stroke="#880E4F" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M80 172 Q120 218, 160 172" 
        fill="#FF80AB" opacity="0.4"/>
  
  <!-- Mejillas sonrojadas -->
  <ellipse cx="50" cy="150" rx="18" ry="12" fill="#FF4081" opacity="0.25"/>
  <ellipse cx="190" cy="150" rx="18" ry="12" fill="#FF4081" opacity="0.25"/>
  
  <!-- Antenas divertidas con gradientes -->
  <line x1="95" y1="32" x2="75" y2="5" stroke="#E91E63" stroke-width="5" stroke-linecap="round"/>
  <circle cx="72" cy="5" r="12" fill="url(#eyeGrad)" filter="url(#softShadow)"/>
  <circle cx="72" cy="5" r="8" fill="#FFEB3B"/>
  
  <line x1="145" y1="32" x2="165" y2="5" stroke="#E91E63" stroke-width="5" stroke-linecap="round"/>
  <circle cx="168" cy="5" r="12" fill="url(#eyeGrad)" filter="url(#softShadow)"/>
  <circle cx="168" cy="5" r="8" fill="#4CAF50"/>
  
  <!-- Pequeños detalles brillantes -->
  <circle cx="45" cy="100" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="195" cy="95" r="3" fill="rgba(255,255,255,0.5)"/>
</svg>
